services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gruppen
      POSTGRES_PASSWORD: gruppen
      POSTGRES_DB: gruppen_drive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gruppen -d gruppen_drive"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gruppen:gruppen@db:5432/gruppen_drive
      SESSION_SECRET: change-me-in-production
      UPLOADS_DIR: /app/data/uploads
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
